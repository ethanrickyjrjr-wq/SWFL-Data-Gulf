<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Lee County average ZIP home value, May 2025 to May 2026, declining from $471,582 to $433,549">
  <!-- Real data: Zillow Home Value Index, average across Lee County ZIPs,
       monthly period_end 2025-05-31 through 2026-05-31 (lake view zhvi_swfl,
       pulled 07/09/2026). Values: 471582 465042 457865 450955 445780 442310
       440183 438579 437639 437124 436605 435432 433549. -->
  <rect width="640" height="320" fill="#ffffff"/>
  <text x="60" y="24" font-size="14" font-weight="600" fill="#242424">Average ZIP home value · Lee County</text>

  <!-- recessive grid -->
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="60" y1="40" x2="610" y2="40"/>
    <line x1="60" y1="150" x2="610" y2="150"/>
    <line x1="60" y1="260" x2="610" y2="260"/>
  </g>
  <g font-size="11" fill="#6b7280">
    <text x="54" y="44" text-anchor="end">$475K</text>
    <text x="54" y="154" text-anchor="end">$450K</text>
    <text x="54" y="264" text-anchor="end">$425K</text>
  </g>

  <!-- soft area under the line -->
  <path d="M60,55 L105.8,83.8 L151.7,115.4 L197.5,145.8 L243.3,168.6 L289.2,183.8 L335,193.2 L380.8,200.3 L426.7,204.4 L472.5,206.7 L518.3,208.9 L564.2,214.1 L610,222.4 L610,260 L60,260 Z" fill="#0891B2" opacity="0.08"/>
  <!-- the series -->
  <path d="M60,55 L105.8,83.8 L151.7,115.4 L197.5,145.8 L243.3,168.6 L289.2,183.8 L335,193.2 L380.8,200.3 L426.7,204.4 L472.5,206.7 L518.3,208.9 L564.2,214.1 L610,222.4" fill="none" stroke="#0891B2" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- endpoint markers + selective direct labels -->
  <circle cx="60" cy="55" r="4" fill="#0891B2" stroke="#ffffff" stroke-width="2"/>
  <circle cx="610" cy="222.4" r="4" fill="#0891B2" stroke="#ffffff" stroke-width="2"/>
  <text x="70" y="52" font-size="12" font-weight="600" fill="#242424">$471.6K</text>
  <text x="602" y="212" font-size="12" font-weight="600" fill="#242424" text-anchor="end">$433.5K</text>

  <!-- x axis -->
  <g font-size="11" fill="#6b7280">
    <text x="60" y="282" text-anchor="start">May ’25</text>
    <text x="197.5" y="282" text-anchor="middle">Aug</text>
    <text x="335" y="282" text-anchor="middle">Nov</text>
    <text x="472.5" y="282" text-anchor="middle">Feb</text>
    <text x="610" y="282" text-anchor="end">May ’26</text>
  </g>
  <text x="60" y="306" font-size="10" fill="#9ca3af">Zillow Home Value Index · through 05/31/2026 · SWFL Data Gulf</text>
</svg>
