<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet {{AGENT_NAME}} — {{COMPANY_NAME}}</title>
</head>
<body style="margin:0;padding:0;background-color:{{PRIMARY}};font-family:{{FONT_FAMILY}};">
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:{{PRIMARY}};">
  <tr>
    <td align="center" style="padding:0;">
      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

        <!-- ━━━━ MASTHEAD ━━━━ -->
        <tr>
          <td style="padding:24px 32px 20px;border-bottom:1px solid rgba(255,255,255,0.10);">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td valign="middle">
                  <img src="{{LOGO_URL}}" alt="{{COMPANY_NAME}}" height="26" style="display:block;border:0;max-height:26px;" />
                  <p style="margin:4px 0 0 0;font-family:{{FONT_FAMILY}};font-size:15px;font-weight:800;color:{{TEXT_PRIMARY}};letter-spacing:-0.4px;">{{COMPANY_NAME}}</p>
                </td>
                <td align="right" valign="middle">
                  <span style="font-family:{{FONT_FAMILY}};font-size:10px;color:{{TEXT_DIM}};text-transform:uppercase;letter-spacing:1.2px;">{{TAGLINE}}</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ━━━━ AGENT HERO ━━━━ -->
        <tr>
          <td align="center" style="padding:52px 32px 32px;">
            <img src="{{AGENT_PHOTO_URL}}" alt="{{AGENT_NAME}}" width="110" height="110" style="display:block;border-radius:50%;border:3px solid {{ACCENT}};margin:0 auto 20px;width:110px;height:110px;object-fit:cover;" />
            <p style="margin:0 0 4px 0;font-family:{{FONT_FAMILY}};font-size:10px;font-weight:700;color:{{ACCENT}};text-transform:uppercase;letter-spacing:2.5px;">YOUR AGENT</p>
            <p style="margin:0 0 4px 0;font-family:{{FONT_FAMILY}};font-size:32px;font-weight:900;color:{{TEXT_PRIMARY}};letter-spacing:-0.8px;">{{AGENT_NAME}}</p>
            <p style="margin:0;font-family:{{FONT_FAMILY}};font-size:13px;color:{{TEXT_DIM}};">{{AGENT_TITLE}}</p>
          </td>
        </tr>

        <!-- ACCENT BAR -->
        <tr>
          <td align="center" style="padding:0 32px 32px;">
            <table cellpadding="0" cellspacing="0" border="0" align="center">
              <tr>
                <td width="48" height="3" style="background-color:{{ACCENT}};border-radius:2px;font-size:0;line-height:0;">&nbsp;</td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ━━━━ BIO ━━━━ -->
        <tr>
          <td style="padding:0 32px 32px;border-bottom:1px solid rgba(255,255,255,0.08);">
            <p style="margin:0;font-family:{{FONT_FAMILY}};font-size:15px;line-height:1.75;color:{{TEXT_PRIMARY}};text-align:center;">{{AGENT_BIO}}</p>
          </td>
        </tr>

        <!-- ━━━━ CAREER STATS ━━━━ -->
        <tr>
          <td style="padding:0;border-bottom:1px solid rgba(255,255,255,0.08);">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td width="200" align="center" style="padding:26px 16px;border-right:1px solid rgba(255,255,255,0.08);">
                  <p style="margin:0 0 4px 0;font-family:{{FONT_FAMILY}};font-size:32px;font-weight:800;color:{{ACCENT}};letter-spacing:-0.5px;">{{STAT1_VALUE}}</p>
                  <p style="margin:0;font-family:{{FONT_FAMILY}};font-size:10px;color:{{TEXT_DIM}};text-transform:uppercase;letter-spacing:1.2px;">{{STAT1_LABEL}}</p>
                </td>
                <td width="200" align="center" style="padding:26px 16px;border-right:1px solid rgba(255,255,255,0.08);">
                  <p style="margin:0 0 4px 0;font-family:{{FONT_FAMILY}};font-size:32px;font-weight:800;color:{{ACCENT}};letter-spacing:-0.5px;">{{STAT2_VALUE}}</p>
                  <p style="margin:0;font-family:{{FONT_FAMILY}};font-size:10px;color:{{TEXT_DIM}};text-transform:uppercase;letter-spacing:1.2px;">{{STAT2_LABEL}}</p>
                </td>
                <td width="200" align="center" style="padding:26px 16px;">
                  <p style="margin:0 0 4px 0;font-family:{{FONT_FAMILY}};font-size:32px;font-weight:800;color:{{ACCENT}};letter-spacing:-0.5px;">{{STAT3_VALUE}}</p>
                  <p style="margin:0;font-family:{{FONT_FAMILY}};font-size:10px;color:{{TEXT_DIM}};text-transform:uppercase;letter-spacing:1.2px;">{{STAT3_LABEL}}</p>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ━━━━ CTA ━━━━ -->
        <tr>
          <td align="center" style="padding:40px 32px 32px;">
            <a href="{{CTA_URL}}" style="display:inline-block;background-color:{{ACCENT}};color:#0f1d24;font-family:{{FONT_FAMILY}};font-size:13px;font-weight:800;text-decoration:none;padding:14px 36px;border-radius:{{BORDER_RADIUS}};letter-spacing:0.3px;">{{CTA_LABEL}}</a>
            <p style="margin:16px 0 0 0;font-family:{{FONT_FAMILY}};font-size:12px;color:{{TEXT_DIM}};">
              <a href="tel:{{CONTACT_PHONE}}" style="color:{{TEXT_DIM}};text-decoration:none;">{{CONTACT_PHONE}}</a>
              &nbsp;&middot;&nbsp;
              <a href="mailto:{{CONTACT_EMAIL}}" style="color:{{ACCENT}};text-decoration:none;">{{CONTACT_EMAIL}}</a>
            </p>
          </td>
        </tr>

        <!-- ━━━━ FOOTER ━━━━ -->
        <tr>
          <td style="padding:16px 32px 24px;border-top:1px solid rgba(255,255,255,0.10);">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="font-family:{{FONT_FAMILY}};font-size:10px;color:{{TEXT_DIM}};line-height:1.5;">{{DISCLAIMER}}</td>
                <td align="right" valign="top"><a href="{{WEBSITE_URL}}" style="font-family:{{FONT_FAMILY}};font-size:11px;color:{{ACCENT}};text-decoration:none;font-weight:600;">{{WEBSITE_URL}}</a></td>
              </tr>
            </table>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
