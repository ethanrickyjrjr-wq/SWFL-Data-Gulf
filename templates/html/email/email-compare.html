<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{COMPANY_NAME}} — Period Comparison</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f0f0;font-family:{{FONT_FAMILY}};">
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f0f0f0;">
  <tr>
    <td align="center" style="padding:24px 16px;">

      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;background-color:{{SURFACE}};border-radius:{{BORDER_RADIUS}};overflow:hidden;">

        <!-- Header -->
        <tr>
          <td style="background-color:{{PRIMARY}};padding:20px 28px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td><img src="{{LOGO_URL}}" alt="{{COMPANY_NAME}}" height="32" style="display:block;border:0;" /></td>
                <td align="right"><span style="color:#ffffff;font-size:11px;font-family:{{FONT_FAMILY}};opacity:0.85;">{{TAGLINE}}</span></td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Title -->
        <tr>
          <td style="padding:24px 28px 4px 28px;">
            <p style="margin:0;font-family:{{FONT_FAMILY}};font-size:18px;font-weight:700;color:{{TEXT}};">Performance Comparison</p>
            <p style="margin:6px 0 0 0;font-family:{{FONT_FAMILY}};font-size:13px;color:{{TEXT}};opacity:0.6;">Last Period vs. This Period</p>
          </td>
        </tr>

        <!-- Column headers -->
        <tr>
          <td style="padding:16px 28px 4px 28px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td width="36%">&nbsp;</td>
                <td width="32%" align="center" style="font-family:{{FONT_FAMILY}};font-size:11px;font-weight:700;color:{{TEXT}};opacity:0.5;text-transform:uppercase;letter-spacing:0.5px;">Last Period</td>
                <td width="32%" align="center" style="font-family:{{FONT_FAMILY}};font-size:11px;font-weight:700;color:{{TEXT}};opacity:0.5;text-transform:uppercase;letter-spacing:0.5px;">This Period</td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Divider -->
        <tr><td style="padding:0 28px;"><table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td height="1" style="background-color:#e0e0e0;font-size:0;line-height:0;">&nbsp;</td></tr></table></td></tr>

        <!-- Row 1 — improvement -->
        <tr>
          <td style="padding:0 28px;background-color:{{SURFACE}};">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td width="36%" style="font-family:{{FONT_FAMILY}};font-size:13px;color:{{TEXT}};padding:14px 0;">Total Revenue</td>
                <td width="32%" align="center" style="font-family:{{FONT_FAMILY}};font-size:14px;color:{{TEXT}};opacity:0.65;padding:14px 0;">$482,310</td>
                <td width="32%" align="center" style="font-family:{{FONT_FAMILY}};font-size:14px;font-weight:700;color:{{ACCENT}};padding:14px 0;">$541,890 ↑</td>
              </tr>
            </table>
          </td>
        </tr>

        <tr><td style="padding:0 28px;"><table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td height="1" style="background-color:#f0f0f0;font-size:0;line-height:0;">&nbsp;</td></tr></table></td></tr>

        <!-- Row 2 — decline -->
        <tr>
          <td style="padding:0 28px;background-color:#f7f7f7;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td width="36%" style="font-family:{{FONT_FAMILY}};font-size:13px;color:{{TEXT}};padding:14px 0;">Avg. Order Value</td>
                <td width="32%" align="center" style="font-family:{{FONT_FAMILY}};font-size:14px;color:{{TEXT}};opacity:0.65;padding:14px 0;">$127.40</td>
                <td width="32%" align="center" style="font-family:{{FONT_FAMILY}};font-size:14px;font-weight:700;color:#c0392b;padding:14px 0;">$114.20 ↓</td>
              </tr>
            </table>
          </td>
        </tr>

        <tr><td style="padding:0 28px;"><table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td height="1" style="background-color:#e0e0e0;font-size:0;line-height:0;">&nbsp;</td></tr></table></td></tr>

        <!-- Row 3 — improvement -->
        <tr>
          <td style="padding:0 28px;background-color:{{SURFACE}};">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td width="36%" style="font-family:{{FONT_FAMILY}};font-size:13px;color:{{TEXT}};padding:14px 0;">New Customers</td>
                <td width="32%" align="center" style="font-family:{{FONT_FAMILY}};font-size:14px;color:{{TEXT}};opacity:0.65;padding:14px 0;">1,203</td>
                <td width="32%" align="center" style="font-family:{{FONT_FAMILY}};font-size:14px;font-weight:700;color:{{ACCENT}};padding:14px 0;">1,589 ↑</td>
              </tr>
            </table>
          </td>
        </tr>

        <tr><td style="padding:0 28px;"><table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td height="1" style="background-color:#f0f0f0;font-size:0;line-height:0;">&nbsp;</td></tr></table></td></tr>

        <!-- Row 4 — decline -->
        <tr>
          <td style="padding:0 28px;background-color:#f7f7f7;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td width="36%" style="font-family:{{FONT_FAMILY}};font-size:13px;color:{{TEXT}};padding:14px 0;">Conversion Rate</td>
                <td width="32%" align="center" style="font-family:{{FONT_FAMILY}};font-size:14px;color:{{TEXT}};opacity:0.65;padding:14px 0;">3.82%</td>
                <td width="32%" align="center" style="font-family:{{FONT_FAMILY}};font-size:14px;font-weight:700;color:#c0392b;padding:14px 0;">3.41% ↓</td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Legend -->
        <tr>
          <td style="padding:14px 28px 8px 28px;">
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="font-family:{{FONT_FAMILY}};font-size:11px;color:{{ACCENT}};padding-right:16px;">↑ Improvement</td>
                <td style="font-family:{{FONT_FAMILY}};font-size:11px;color:#c0392b;">↓ Decline</td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Divider -->
        <tr><td style="padding:0 28px;"><table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td height="1" style="background-color:#e0e0e0;font-size:0;line-height:0;">&nbsp;</td></tr></table></td></tr>

        <!-- Footer -->
        <tr>
          <td style="padding:16px 28px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="font-family:{{FONT_FAMILY}};font-size:11px;color:{{TEXT}};opacity:0.5;">{{DISCLAIMER}}</td>
                <td align="right" style="font-family:{{FONT_FAMILY}};font-size:11px;"><a href="{{WEBSITE_URL}}" style="color:{{PRIMARY}};text-decoration:none;">{{WEBSITE_URL}}</a></td>
              </tr>
            </table>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
