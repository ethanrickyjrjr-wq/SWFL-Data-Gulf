<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{COMPANY_NAME}} — Hero Stat</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f0f0;font-family:{{FONT_FAMILY}};">
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f0f0f0;">
  <tr>
    <td align="center" style="padding:24px 16px;">

      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;border-radius:{{BORDER_RADIUS}};overflow:hidden;">

        <!-- Logo bar -->
        <tr>
          <td style="background-color:{{PRIMARY}};padding:18px 28px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td><img src="{{LOGO_URL}}" alt="{{COMPANY_NAME}}" height="28" style="display:block;border:0;" /></td>
                <td align="right"><span style="color:#ffffff;font-size:11px;font-family:{{FONT_FAMILY}};opacity:0.8;">{{TAGLINE}}</span></td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Hero card body -->
        <tr>
          <td align="center" style="background-color:{{PRIMARY}};padding:48px 28px 56px 28px;">

            <!-- Label -->
            <p style="margin:0 0 12px 0;font-family:{{FONT_FAMILY}};font-size:12px;font-weight:700;color:#ffffff;opacity:0.7;text-transform:uppercase;letter-spacing:1.5px;">Total Portfolio Value</p>

            <!-- Giant number -->
            <p style="margin:0 0 20px 0;font-family:{{FONT_FAMILY}};font-size:64px;font-weight:800;color:{{TEXT}};line-height:1;letter-spacing:-2px;">$4.2M</p>

            <!-- Divider line -->
            <table cellpadding="0" cellspacing="0" border="0" style="margin:0 auto 20px auto;">
              <tr><td width="60" height="3" style="background-color:{{ACCENT}};border-radius:2px;font-size:0;line-height:0;">&nbsp;</td></tr>
            </table>

            <!-- Supporting sentence -->
            <p style="margin:0;font-family:{{FONT_FAMILY}};font-size:16px;color:#ffffff;opacity:0.88;line-height:1.55;max-width:380px;">Up <strong style="color:{{TEXT}};">12.4%</strong> from last quarter — the strongest single-period gain in 18 months across all ZIP code segments.</p>

          </td>
        </tr>

        <!-- Stats strip -->
        <tr>
          <td style="background-color:{{ACCENT}};padding:0;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td width="33%" align="center" style="padding:16px 8px;border-right:1px solid rgba(255,255,255,0.2);">
                  <p style="margin:0 0 4px 0;font-family:{{FONT_FAMILY}};font-size:18px;font-weight:700;color:#ffffff;">847</p>
                  <p style="margin:0;font-family:{{FONT_FAMILY}};font-size:10px;color:#ffffff;opacity:0.75;text-transform:uppercase;letter-spacing:0.5px;">Active ZIPs</p>
                </td>
                <td width="33%" align="center" style="padding:16px 8px;border-right:1px solid rgba(255,255,255,0.2);">
                  <p style="margin:0 0 4px 0;font-family:{{FONT_FAMILY}};font-size:18px;font-weight:700;color:#ffffff;">94.3%</p>
                  <p style="margin:0;font-family:{{FONT_FAMILY}};font-size:10px;color:#ffffff;opacity:0.75;text-transform:uppercase;letter-spacing:0.5px;">Occupancy</p>
                </td>
                <td width="33%" align="center" style="padding:16px 8px;">
                  <p style="margin:0 0 4px 0;font-family:{{FONT_FAMILY}};font-size:18px;font-weight:700;color:#ffffff;">$5,210</p>
                  <p style="margin:0;font-family:{{FONT_FAMILY}};font-size:10px;color:#ffffff;opacity:0.75;text-transform:uppercase;letter-spacing:0.5px;">Avg. Unit</p>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background-color:{{SURFACE}};padding:14px 28px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="font-family:{{FONT_FAMILY}};font-size:11px;color:{{TEXT}};opacity:0.45;">{{DISCLAIMER}}</td>
                <td align="right"><a href="{{WEBSITE_URL}}" style="font-family:{{FONT_FAMILY}};font-size:11px;color:{{PRIMARY}};text-decoration:none;">{{WEBSITE_URL}}</a></td>
              </tr>
            </table>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
