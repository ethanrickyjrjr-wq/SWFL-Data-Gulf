#   BOUNDED-DELETE WRITE-BACK, NOT INGEST — registered HERE (documented) but kept OUT
#   of `pipelines:` (NOT freshness-probed). It is not a data source: it hard-deletes
#   deliverables soft-trashed (deleted_at) more than 7 days ago. On most days it
#   deletes ZERO rows (nobody trashed anything old enough), so a STALE/LOW_VOLUME
#   probe assertion would be a guaranteed false alarm.
#   Filter is inherently guarded: `deleted_at IS NOT NULL AND deleted_at < now()-7d`,
#   so it can never touch a live or recently-trashed row. A bounded DELETE, not a
#   multi-minute fetch → no PROBE-FIRST timing concern (the --dry-run IS the probe).
#   Cadence: daily 09:15 UTC (standalone slot, off the 08:30 project-feed lane).
#   Runner:  scripts/deliverables/retention-sweep.mts (--dry-run = count-only probe)
#   GHA:     .github/workflows/deliverables-retention-sweep-daily.yml
#
# /api/cron/data-readiness (Phase 3C — T-60 preflight verification before email blasts)
#   EVENT-DRIVEN VERCEL CRON, NOT INGEST — registered HERE (documented) but kept OUT
#   of `pipelines:` (NOT freshness-probed). It does not write to the data lake; it
#   reads email_schedules and project items, runs the metric verification
#   ladder (web_consensus → web_single → model_only → last_known → omitted), and
#   appends rows to public.data_readiness_alerts. On a quiet day (no sends upcoming)
#   it writes ZERO rows — a STALE/LOW_VOLUME probe would be a guaranteed false alarm.
#   Cadence: hourly 0 * * * * (runs every hour; only does work in the T-75min window
#     before an actual send). Registered in vercel.json crons.
#   Runner:  app/api/cron/data-readiness/route.ts (GET, CRON_SECRET auth)
#   Sources: Anthropic web_search (web_search_20250305) grounding on claude-sonnet-4-6
#   Tolerances: ingest/data-verification-tolerances.yaml
#   Brain-first / destructive-write gates DON'T apply (no lake write). PROBE FIRST
#   does in spirit: the grounded web_search call is the probe (graceful null on fail).

# ── coverage_exempt: the machine-readable half of the exclusion block above ──────────────
# Phase 2's --live zero-coverage check ("a live lake table with rows and no pipelines: entry
# is RED") reads THIS. Without it the check false-floods on every intentional non-source
# write and becomes noise nobody reads. The narrative for each row is in the comment block
# above; the `note:` here is the one-line why.
#
# SCOPE — what coverage_exempt does NOT do: it suppresses the ZERO-COVERAGE assertion only.
# It does NOT bless a pack reading one of these tables. (Historical example: env-swfl
# live-queried the exempt, frozen data_lake.usgs_sites until the 07/19/2026 Parquet repoint
# of usgs-water-source.mts) — that class is a SEPARATE Phase-2 RED ("pack reads a
# legacy/excluded table", spec section 6). Two assertions, two answers. Do not collapse them.
coverage_exempt:
  - table: data_lake.dbhydro_stations
    reason: defunct_source
    note: "SFWMD DBHYDRO API decommissioned (OAuth wall on new REST). 12,937 rows are a legacy artifact; no pipeline writes this table. History: docs/API_BLUEPRINTS_DBHYDRO.md."

  - table: data_lake.usgs_sites
    reason: legacy_scheduled_drop
    note: "900 rows from a deprecated dlt pipeline. The live USGS workflow (usgs-monthly.yml) writes Parquet to Tier-1 only. DROP scheduled once env-swfl migrates to Parquet (docs/superpowers/plans/2026-05-19-usgs-postgres-to-parquet-migration.md). STILL LIVE-READ by env-swfl via usgs-water-source.mts:33 — that read is a separate Phase-2 RED, not suppressed by this exemption."

  - table: data_lake.fdot_freight_nowcast_shock_log
    reason: brain_write_back
    note: "Written by refinery/sources/fdot-freight-source.mts during stage-4 brain execution, not by ingest. Same category as public.predictions — wrong layer for an ingest guard; the pack owns its own write-back integrity."

  - table: public.project_feed
    reason: derived_signal_write_back
    note: "Piece 3 signal layer. scripts/project-feed/change-detection.mts appends a data-change row ONLY when a tracked per-ZIP brain metric moves. ZHVI/ZORI refresh ~monthly, so ZERO rows on a quiet day is CORRECT — a daily STALE/LOW_VOLUME assertion would be a guaranteed false alarm. GHA: project-feed-change-detection-daily.yml."

  - table: public.deliverables
    reason: bounded_delete_sweep
    note: "FINAL BOSS Piece 4 retention sweep hard-deletes deliverables soft-trashed >7d ago. Not a data source. On most days it deletes ZERO rows. GHA: deliverables-retention-sweep-daily.yml."

  - table: public.data_readiness_alerts
    reason: event_driven_app_cron
    note: "Phase 3C T-60 email preflight (app/api/cron/data-readiness/route.ts, a Vercel cron). No lake write; appends alerts only in the T-75min window before an actual send. ZERO rows on a quiet day is CORRECT."

  # Added 07/12/2026 — Phase 2 --live zero-coverage sweep. Each row names its real writer
  # (verified in-tree). REAL gaps deliberately NOT exempted: community_profiles +
  # neighborhood_stats (check communities_tables_zero_coverage) — a RED that produces a
  # decision. (parcel_subdivision, the third, RESOLVED 07/19/2026: table retired for the
  # parcel_subdivision_v view over lee/collier_parcels.)
  - table: data_lake.view_vintages
    reason: derived_snapshot
    note: "PIT capture of our own zhvi/zori views — capture_view_vintages.py via view-vintages-monthly.yml (day 26). Not a vendor source; promote-to-pipelines decision rides check coverage_exempt_confirm_three."

  - table: data_lake.source_totals
    reason: derived_signal_write_back
    note: "/census source-ceiling snapshot rows (migrations/20260707_source_totals.sql; census audit tooling writes, ops repo reads latest per pipeline_name). Derived ops telemetry, not a source."

  - table: data_lake.mhs_jurisdiction_xwalk
    reason: static_seed
    note: "Jurisdiction crosswalk seeded by the J3 migration; read by ingest/pipelines/mhs_permits_swfl/geocode.py:155. Never re-written on a cadence."

  - table: data_lake.user_mls_listings
    reason: client_upload_surface
    note: "Client RESO/MLS upload surface — lib/reso/sync.ts writes it per user connection (migrations/20260625_user_mls_data_lake.sql). App-side, not ingest."

  - table: data_lake.user_mls_stats
    reason: client_upload_surface
    note: "Aggregates over user_mls_listings — same lib/reso writer, same class."

  - table: data_lake.geo_anchor_cache
    reason: runtime_cache
    note: "Geocode-ladder cache (ingest/lib/geo_ladder.py; migrations/20260710_pulse_geo.sql). Opportunistic inserts on pulse distills; 0 new rows on a quiet day is CORRECT."

  - table: data_lake.listing_transitions
    reason: secondary_pipeline_table
    note: "listing_lifecycle's transition LOG — written in the same run as listing_state (the entry's freshness/count target; migration 20260627_listing_lifecycle.sql). Registered pipeline, second table."

