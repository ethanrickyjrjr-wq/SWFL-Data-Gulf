# Cadence registry for the daily freshness probe.
#
# Verified against live DB 2026-05-26. Each entry was confirmed with:
#   Tier-1: SELECT id, updated_at FROM data_lake._tier1_inventory WHERE id LIKE '<prefix>%' ...
#   Tier-2: SELECT schema_name, MAX(inserted_at) FROM data_lake._dlt_loads WHERE schema_name = '<name>' GROUP BY 1
#
# Schema per entry:
#   name:                  human-readable identifier (matches pipeline dir name)
#   lane:                  tier-1 | tier-1-duckdb | tier-2
#   cadence_days:          how often the SOURCE publishes (not how often we run)
#   tolerance_multiplier:  alert when age > cadence_days * tolerance; default 2.0
#
#   Tier-1 / tier-1-duckdb entries also require ONE of:
#     inventory_id + inventory_key_type: exact   # fixed path, overwritten each run
#     inventory_id + inventory_key_type: prefix  # date-partitioned; latest row wins
#   The probe queries data_lake._tier1_inventory.updated_at (always a proper timestamp).
#
#   Tier-2 entries also require:
#     dlt_schema_name:   the schema_name value in data_lake._dlt_loads
#
#   Non-dlt tier-2 entries may optionally set:
#     freshness_column:  the timestamp column to query MAX() on (default: inserted_at).
#                        Set when the table uses a different column, e.g. scraped_at or last_seen_at.
#
#   Volume guard fields (optional, any lane):
#     expected_rows_min: N   # floor row count; probe emits LOW_VOLUME (not STALE) when below
#     count_table: schema.table  # required for tier-2 dlt entries where dlt_schema_name
#                                # differs from the actual Postgres table name.
#                                # Falls back to freshness_table for non-dlt entries.
#                                # Tier-1 entries: volume check is skipped (no SQL table).
#
#   SLA fields (optional, any lane — opt-in; absent = observability-only, no exit-code change):
#     freshness_sla:
#       warn_after_days: N   # log 🟡 SLA WARN in summary; exit 0
#       error_after_days: N  # exit 1 if ANY opted-in source breaches this; set ≥ 2× cadence_days
#                            # so only genuinely dead sources trigger it, not transient delays.
#                            # DB-connection failure and probe errors always exit 0 (build 03 invariant).
#
#   SPINE fields (added 07/11/2026 — the registry is the single source of config truth):
#     workflow: <name>.yml   REQUIRED on every entry. The .github/workflows/ file that runs it.
#                            `none` = a STATED FACT (no workflow writes this entry: usgs_tier2 is a
#                            zombie whose producing module was deleted; mhs_databook is a manual PDF
#                            drop). Absence of the field = a GAP the Phase-2 cross-check flags.
#                            May be non-unique: one workflow can back several entries
#                            (live-search-daily.yml -> 2, marketbeat-pdf-ingest.yml -> 3,
#                            bls-oews-annual.yml -> 2, ingest-fl-dbpr-licenses.yml -> 2,
#                            ingest-local-cre-context.yml -> 2). That is structure, not error.
#                            THIS FIELD IS AUTHORITATIVE. The freeform `# Cron: <file>.yml` comments
#                            scattered through this file are NON-AUTHORITATIVE PROSE — kept only for
#                            the cron timing / stagger rationale they carry, which this field does
#                            not capture. A comment may never again be the SOLE carrier of a
#                            workflow filename: test_cadence_registry_spine.py enforces it.
#     consuming_pack: <v>    REQUIRED on every entry. What reads this source. One of:
#                              a pack id            e.g. env-swfl
#                              a flow list          e.g. [env-swfl, hurricane-tracks-fl]
#                              a non-pack repo path e.g. lib/zip-summary (census_acs),
#                                                        app/insiders (news_swfl)
#                                                   — a pack-ONLY check would RED a healthy source
#                              none                 a STATED FACT: nothing reads it. Ten entries are
#                                                   in this state today; that is a real finding, not
#                                                   a missing value.
#     nightly: true          OPTIONAL, opt-in. GATE MEMBERSHIP, NOT CADENCE: assert_landed.py
#                            (the nightly chain's row gate) asserts this entry landed TODAY (UTC)
#                            AND count(*) >= expected_rows_min. Absence = not gated (safe default).
#                            Exactly 4 entries carry it: live_search x2, listing_lifecycle,
#                            city_pulse — pinned in ingest/tests/test_cadence_registry_spine.py so
#                            a 5th member is a conscious edit. active_listings runs daily but is
#                            NOT gated (its table feeds nothing live); market_aggregates_* are
#                            weekly/monthly.
#     count_filter: {column: <col>, value: <literal>}
#                            REQUIRED on a `nightly:` entry whose count target (count_table, else
#                            freshness_table) is ALSO claimed by another `nightly:` entry. Both
#                            live_search entries count data_lake.daily_truth and neither has a
#                            source_name, so without this each would satisfy its own row floor with
#                            the OTHER metric's rows — a dead feed reading LANDED forever. The
#                            discriminator is metric_key (median_asking_price / mortgage_30yr_fixed);
#                            daily_truth's source_tag column cannot do it — it is the literal
#                            'live_search' for both (engine.py:67). Read ONLY by assert_landed.py;
#                            check_volume_entry scopes on source_name and ignores it.
#     THE ROW FLOOR IS `expected_rows_min`. There is deliberately NO `min_rows:` field — a second
#     floor beside an existing one is a hand-synced pair, i.e. the drift class this build kills.
#     THERE IS NO `source_tag:` FIELD. Source identity is `source_name:` — the column
#     check_freshness.py actually filters on (:238 freshness, :382 volume). A `source_tag:` was
#     deleted 07/11/2026 because nothing read it (see the news_swfl entry). (data_lake.daily_truth
#     does have a source_tag COLUMN; that is unrelated — see count_filter above.)
#     TIER-1 + count_table IS NOT A CONFIG ERROR. check_volume_entry skips tier-1
#     (check_freshness.py:369-371), so a tier-1 entry carrying count_table + expected_rows_min is
#     gated by assert_landed.py instead — city_pulse is the case. The doctor must read that as
#     GATED_BY_ASSERT_LANDED (green), never as a broken volume config (red).
#
#   coverage_exempt:  top-level list at the END of this file. Live lake tables with rows and no
#                     pipelines: entry that are consciously NOT sources. Suppresses Phase 2's
#                     ZERO_COVERAGE red — and nothing else.
#
#   source_scope (optional, any lane — filled in ONLY by a real per-source research pass,
#                 crawl4ai per RULE 0.4; never a guessed number; absent = "pending research"):
#     confirmed_total: {value, as_of, source_url, source_label}
#       The source's own confirmed/published total — DISTINCT from expected_rows_min above,
#       which is a 90%-of-last-observed-count heuristic, not a confirmed promise.
#     source_ceiling: {summary, source_url}
#       Everything the source publishes that we could pull, even fields/years/geography we
#       don't currently ingest — the true ceiling, not just what we've built so far.
#     vendor_benchmark: {source, value, as_of, source_url}
#       An external authority's own count for the same scope (e.g. Redfin's own published
#       inventory count for a ZIP/county). Omit entirely when no real comparable exists —
#       never fill with a placeholder or "N/A" value.
#   Read live by /ops/census (swfldatagulf-ops repo). See
#   docs/superpowers/specs/2026-07-07-pipeline-data-census-design.md for the full design.
# Naming note: dlt_schema_name is the schema_name column in _dlt_loads, NOT the
# pipeline_name argument in pipeline.py (they sometimes differ — see verified values below).

pipelines:
  # ── Tier-2 daily freshness (daily_truth writers: lake / api / search modes) ──
  # Sourced metrics: value + real source URL; anomaly check vs OUR OWN prior value
  # (anomaly_threshold_pct is per-metric). Writes data_lake.daily_truth (consumer: freshness-pulse brain).
  # RETIRED 07/12/2026: live_search_daily_median_price (fetch_mode: search, metric_key
  # median_sale_price). It web-searched a daily city-grain SOLD median that has no daily source
  # anywhere — 19 straight days of NULL rows ("all cascade legs returned no sourced number";
  # only the Gemini leg was ever live, its 3 fallbacks are stubs). Replaced by the lake-mode
  # ASKING metric below (deterministic, our own inventory) + the monthly SOLD anchor in
  # data_lake.redfin_city_swfl. Spec: docs/superpowers/specs/2026-07-11-daily-price-dual-signal-design.md
  - name: live_search_daily_median_asking
    workflow: live-search-daily.yml
    consuming_pack: freshness-pulse
    nightly: true
    lane: tier-2
    cadence_days: 1
    tolerance_multiplier: 1.5
    freshness_table: data_lake.daily_truth
    freshness_column: retrieved_at
    # NO source_name filter: daily_truth's source column is source_tag (not source_name) and
    # the table is single-writer (live_search only). The filter made both the ops ledger and
    # check_freshness.py error out -> FALSE RED while data was fresh (fixed 07/05/2026).
    expected_rows_min: 1
    count_filter: { column: metric_key, value: median_asking_price } # R1 — WITHOUT THIS THE GATE
      # IS A LIE. This entry and live_search_daily_mortgage share freshness_table
      # data_lake.daily_truth, and daily_truth has no source_name column (see :52-54), so a bare
      # COUNT(*) mixes the two metrics: each would satisfy its floor with the OTHER's rows.
      # `metric_key` is the ONLY discriminating column — daily_truth.source_tag is the hardcoded
      # string 'live_search' for BOTH (engine.py:67). Read ONLY by Phase 4's assert_landed —
      # check_volume_entry scopes on source_name (check_freshness.py:382) and ignores this key.
    count_nonnull: value # OUTCOME floor, not effort floor: count(value), not count(*), so a
      # NULL-valued row can never satisfy expected_rows_min. The retired median_sale_price
      # metric wrote 3 NULL rows/night for 19 days while this gate read LANDED — that class
      # is now structurally impossible (assert_landed.py counts the named column). 07/12/2026.
    freshness_sla:
      warn_after_days: 2    # past 1.5× tolerance threshold; log WARN but keep exit 0
      error_after_days: 4   # 4× cadence — genuinely dead (transient outages resolve in <2d)
    note: "Daily median ASKING price per desk city — lake mode: deterministic median over data_lake.listing_active_homes (the cleaned homes-only authority view), no search, no LLM. Anomaly vs own prior; expected_range gate catches a land-blend regression. Replaced the retired median_sale_price web-search 07/12/2026."
    live_search_config:
      fetch_mode: lake
      metric_key: median_asking_price
      areas: ["cape_coral", "fort_myers", "naples"]
      questions:
        - "median asking (list) price, active home listings, {area_label}, Florida — own-lake rollup"
      denylist_domains: []
      vendor_anchor_table: data_lake.redfin_city_swfl
      lake_config: { source_url: "https://www.swfldatagulf.com/desk" }
      unit: usd
      expected_range: [150000, 900000]
      tolerance_pct: 10
      anomaly_threshold_pct: 8
    source_scope:
      confirmed_total:
        summary: "Daily median asking price, 3 desk cities (Cape Coral, Fort Myers, Naples), computed from our own cleaned active-listing inventory (listing_active_homes authority view; Cape Coral $400,000 / Fort Myers $325,000 / Naples $662,450 verified live 07/12/2026)"
        source: "our ingest"
      source_ceiling:
        summary: "Any city with active inventory in the lake is a config-only areas addition (Bonita Springs, Estero, Marco Island, Lehigh Acres...). Same lake mode could answer active-count or median-DOM per city. The SOLD companion lives in data_lake.redfin_city_swfl (monthly, every FL city)."
        as_of: "07/12/2026"
        source_label: "our own active-listing inventory (data_lake.listing_active_homes)"

  - name: live_search_daily_mortgage
    workflow: live-search-daily.yml
    consuming_pack: freshness-pulse
    nightly: true
    lane: tier-2
    cadence_days: 1
    tolerance_multiplier: 1.5
    freshness_table: data_lake.daily_truth
    freshness_column: retrieved_at
    # NO source_name filter — same source_tag/source_name mismatch as median_price above (fixed 07/05/2026).
    expected_rows_min: 1
    count_filter: { column: metric_key, value: mortgage_30yr_fixed } # R1 — see the twin comment on
      # live_search_daily_median_asking. This is the entry the mask hurt most: 1 row/day
      # (areas: ["swfl"]) against a median metric writing 3/day, so a dead mortgage feed would
      # have hidden behind median rows indefinitely.
    count_nonnull: value # OUTCOME floor — count(value), never count(*); a FRED outage writes a
      # value=NULL row with a status_reason, and that row must not satisfy the floor. 07/12/2026,
      # twin of the median_asking entry above.
    note: "Daily 30-yr fixed mortgage from FRED MORTGAGE30US (weekly Thu; api mode = authoritative, no search). Was false-RED on ops until 07/05/2026 (source_name filter vs source_tag column — removed)."
    live_search_config:
      fetch_mode: api
      metric_key: mortgage_30yr_fixed
      areas: ["swfl"]
      api_config: { provider: fred, series_id: MORTGAGE30US, source_url: "https://fred.stlouisfed.org/series/MORTGAGE30US" }
      vendor_anchor_table: null
      unit: pct
      expected_range: [2.0, 12.0]
      tolerance_pct: 5
      anomaly_threshold_pct: 8
    source_scope:
      confirmed_total:
        summary: "Daily 30-yr fixed mortgage rate (national), FRED MORTGAGE30US"
        source: "our ingest"
      source_ceiling:
        value: 2
        summary: "Same FRED release (rid=190) also carries MORTGAGE15US (15-yr fixed) — confirmed live, same API call shape, zero new integration cost. Every OTHER series in that release (5/1 ARM, 1-yr ARM, points/margin, regional variants) is confirmed DISCONTINUED by FRED — a real vendor ceiling, not a gap."
        as_of: "07/08/2026"
        source_url: "https://fred.stlouisfed.org/release?rid=190"
        source_label: "FRED — Mortgage Rates release"

  # ── Tier-1 DuckDB (fixed-path Parquet, overwritten each run) ─────────────
