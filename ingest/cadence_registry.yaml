    # Zillow ZHVI ZIP-level all-homes middle-tier (0.33-0.67) smoothed+SA home-value index.
    # Cron: zhvi-tier1-monthly.yml (day 22). Pack: refinery/packs/home-values-swfl.mts.
    source_scope:
      confirmed_total:
        summary: "ZHVI ZIP-level all-homes middle-tier, smoothed+SA — live"
        source: "our ingest"
      source_ceiling:
        summary: "Zillow also publishes ZHVI cut by bedroom count and SF-vs-condo, a raw (non-SA) variant, and ZHVF (Home Value Forecast, 1yr-ahead) — same ZIP grain, free, not pulled."
