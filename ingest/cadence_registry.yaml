    inventory_id: lake-tier1/market/tier_divergence_swfl.parquet
    inventory_key_type: exact
    # Zillow ZHVI tier split (top 0.67-1.0 luxury vs bottom 0.0-0.33 starter), RAW, ZIP-level.
    # FULL OUTER JOIN of the two tiers per zip x month. Cron: tier-divergence-tier1-monthly.yml
    # (day 21). Pack: refinery/packs/tier-divergence-swfl.mts.
    source_scope:
      confirmed_total:
        summary: "ZHVI tier split (top 0.67-1.0 vs bottom 0.0-0.33), ZIP grain, raw — live"
        source: "our ingest"
      source_ceiling:
        summary: "Zillow's inventory/days-on-market/price-cut/new-construction/sales/affordability categories are metro-or-national grain only — no ZIP cut exists (vendor ceiling)."
        as_of: "07/07/2026"
        source_url: "https://www.zillow.com/research/data/"
        source_label: "Zillow Research Data"

  - name: redfin_swfl
    workflow: redfin-monthly.yml
    consuming_pack: housing-swfl
    lane: tier-1-duckdb
    cadence_days: 30
    tolerance_multiplier: 2.0
    inventory_id: lake-tier1/market/redfin_swfl.parquet
    inventory_key_type: exact
    # RETARGETED 07/16/2026: the legacy dump (redfin_market_tracker/
    # zip_code_market_tracker.tsv000.gz) FROZE at Last-Modified 06/02/2026 while
    # serving stale 200s — two green crons re-landed identical bytes and the
    # housing brain served a March window into mid-July. Now pulls
    # redfin_data_center/housing_market/monthly/all_zips.csv (~660 MB CSV) with
    # in-pipeline guards: MIN_ROWS floor + newest-PERIOD-END content gate (40d)
    # + source ETag/Last-Modified recorded on the inventory row (a byte-identical
    # re-pull logs SOURCE UNCHANGED loud). Spec:
    # docs/superpowers/specs/2026-07-17-redfin-datacenter-retarget-design.md
    source_scope:
      confirmed_total:
        value: 10072
        as_of: "07/16/2026"
        source: "our ingest (126 ZIPs × ~80 rolling-3-month windows since 2019; ALL 50 source columns pulled, values as-written)"
      source_ceiling:
        summary: "Same bucket/prefix, unpulled: property_types/monthly/all_zips.csv (1.42 GB, per-property-type ONLY — no all-residential rollup rows); contract_cancellations + delistings_relistings monthly ZIP files; price_drops ZIP file (own pipeline: redfin_price_drops). Weekly feeds are metro-grain and coarser only — no weekly ZIP file exists, monthly is the finest ZIP cadence."
        as_of: "07/16/2026"
        source_url: "https://www.redfin.com/news/data-center/downloads/"
        source_label: "Redfin Data Center — Downloads"

