# Significance registry — per-slug thresholds for the change evaluator.
#
# Three threshold_type values:
#   absolute_change  — fires when |curr - prev| >= threshold (use for rates, indexes, %)
#   percent_change   — fires when |(curr-prev)/prev| * 100 >= threshold (use for counts, $)
#   state_change     — fires when the transition is in monitored_transitions
#
# impact_weight: 1–10 (how consequential a move at-threshold is to a CRE/RE project)
# unit: optional, shapes the delta_description ("rose 25bps" vs "rose 0.25")
#
# _default: catch-all for any slug not listed here. threshold 99999 = never fires.
# Rule: unregistered slugs are SILENT. Add a slug here to enable its nudge.
#
# Phase B1 fields (absorbed from data-verification-tolerances.yaml):
#   category       — maps to a category row in data-verification-tolerances.yaml for fallback
#   z_flag_threshold — z-score vs 30-day rolling mean that flags a value as implausible
#   max_stale_days  — how old the last-known value can be before we omit rather than substitute

_default:
  threshold_type: percent_change
  threshold: 99999
  impact_weight: 1
  category: _default
  z_flag_threshold: 3.0
  max_stale_days: 30

