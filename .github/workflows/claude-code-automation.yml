name: Claude Code Automation
# Fires on an explicit signal only: an @claude comment or an issue assigned to
# Claude. NOT on every issue `opened` (that summoned Claude on any new issue —
# too broad, and it double-fired on the self-healing deploy-incident issues,
# which are handled by the label-gated claude-deploy-triage workflow instead).
on:
  issues:
    types: [assigned]
  issue_comment:
    types: [created]

jobs:
  claude-task:
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
