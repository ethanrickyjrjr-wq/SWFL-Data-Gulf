name: Pipeline freshness probe (daily)

on:
  schedule:
    # 14:00 UTC = 10 AM ET, after the 13:00 UTC ingest cluster runs.
    # Non-gating: this is observability, not enforcement.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print to stdout, skip $GITHUB_STEP_SUMMARY write"
        required: false
        default: "false"

permissions:
  contents: read
  actions: read # doctor's run-status domain: `gh run list` / `gh workflow list` 403 without it.
  # With an explicit permissions block, unspecified scopes default to NONE.

jobs:
  probe:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r ingest/requirements-probe.txt
      - env:
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.scripts.check_freshness --dry-run
          else
            python -m ingest.scripts.check_freshness
          fi
      # SOLO-25: Quality (value tests) + Schema (column-type-change) pillars.
      # Separate step = independent log + step-summary visibility. Both non-gating
      # (exit 0). Opt-in per table via ingest/quality/quality_registry.yaml.
      - name: Data-quality probe (value tests + schema drift)
        env:
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.scripts.check_data_quality --dry-run
          else
            python -m ingest.scripts.check_data_quality
          fi

      # doctor — one health line per dataset: worst of {freshness, volume, content, run-status}
      # + a prescription. Imports check_freshness + check_data_quality (does not re-query) and
      # joins the gh run-status domain over `gh`. ADVISORY: exits 0 always; --fail-on red is
      # the deliberate, separately-approved flip. Read-only — writes no row and no ledger entry.
      - name: doctor (pipeline health — advisory)
        if: always()
        env:
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m ingest.scripts.doctor --cron

      # UPSTREAM source-liveness. The two probes above read the DATABASE ("did we write
      # lately") — they are structurally blind to a source that has silently started
      # 400-ing, because a dead source writes nothing and the last good load keeps
      # reading FRESH until the staleness window ages out (547 days for an annual
      # source; collier_parcels would have stayed green until ~Dec 2027). This step
      # hits each SOURCE with the pipeline's real query. It runs DAILY even though some
      # of these sources are annual — liveness is checked on the CLOCK, not the cadence.
      # Exits 1 (red run) on a BROKEN source: that loudness is the entire point.
      - name: Upstream source-liveness probe (ArcGIS)
        if: always()
        run: python -m ingest.scripts.probe_source_liveness

      # External dead-man's-switch. if: always() is load-bearing here — the probe
      # exits 1 on an SLA breach (a WORKING alarm), and we must still confirm the
      # schedule fired. success() would spuriously alert HC whenever data is stale.
      - name: Healthchecks.io heartbeat
        if: always()
        run: |
          curl -fsS -m 10 --retry 3 \
            "https://hc-ping.com/${{ secrets.HEALTHCHECKS_PING_KEY }}/freshness-probe-daily?create=1" || true
