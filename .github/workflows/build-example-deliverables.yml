name: Rebuild Example Deliverables

on:
  # CRON DISABLED 07/18/2026 (operator: "don't need daily rebuilds on something
  # that doesn't even work"). The daily rebuild spent ~$0.21/day keeping the
  # showcase examples' freshness_token current; examples now rebuild on manual
  # dispatch only. Reverting the daily clock is one uncomment away.
  # schedule:
  #   # 08:23 UTC daily — after the 04:23 Daily Brain Rebuild refreshes brains/*.md
  #   # (even with observed multi-hour schedule drift), so the examples carry the
  #   # current freshness_token (matching live /r/*). :23 = off the top-of-hour
  #   # congestion (GitHub schedule delays peak at :00).
  #   - cron: "23 8 * * *"
  workflow_dispatch:

# Serialize so a manual dispatch can't race a scheduled run's upserts.
concurrency:
  group: build-example-deliverables
  cancel-in-progress: false

jobs:
  rebuild-examples:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild example deliverables
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: bun run scripts/build-example-deliverables.mts
