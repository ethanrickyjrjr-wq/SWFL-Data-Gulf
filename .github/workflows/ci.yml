name: CI

on:
  push:
    branches: [main]
    # The rebuild bot commits ONLY brains/ (daily-rebuild.yml `git add brains/`).
    # Brain markdown is data output — nothing CI checks (tsc/eslint/bun test)
    # reads it, so a brains-only push burns ~10 min of CI for zero signal.
    # paths-ignore skips the run only when EVERY changed file matches; any push
    # mixing code with brains/ still runs full CI.
    paths-ignore:
      - "brains/**"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx eslint .

      # Several bun:test suites launch a real browser (lib/pdf rasterize + the
      # PDF/HTML visual-parity tests). `bun test` has no browser without this, so
      # they failed with "Executable doesn't exist" and red-ed main. `chromium`
      # pulls both the full browser and the headless shell the tests use.
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Test
        run: bun test

      # node:test files under .github/scripts (the cron-failure classifier + the
      # trigger-list drift guard). `bun test` does NOT discover these — bun ignores
      # dot-dirs and these are node:test, not bun:test — so they need their own step
      # or they ship unenforced.
      - name: Test .github scripts (node:test)
        run: node --test .github/scripts/*.test.mjs scripts/lib/*.test.mjs .claude/hooks/*.test.mjs

      # Dead-code detector (Operation July task 20). PHASE 1: REPORT-ONLY — knip.jsonc
      # sets rules.files to "warn", so this exits 0 and only prints the candidate orphan
      # list in the CI log. Flip rules.files to "error" once the ~14-file surface is
      # triaged clean, to fail the build on newly-orphaned modules (phase 2).
      - name: Dead code (knip, report-only)
        run: bunx --bun knip

      # Ratchet on raw lake reads in page/loader code. Does NOT ban them — most
      # surviving reads are legitimately live (a time series or a daily feed that
      # no brain publishes). It fails only on a NEW un-triaged one, so the pattern
      # that took /desk and /charts down on 07/21/2026 — each bypass locally
      # reasonable, the accumulation fatal — cannot rebuild itself silently.
      - name: Lake-read ratchet
        run: bun scripts/check-lake-reads.mts

      # Config-identity cross-check. --static is files-only and matches the pre-push
      # Gate 7 exactly, so a push that bypassed the hook still fails here.
      - name: Registry identity (static)
        run: bun ingest/tools/check-registry-identity.mts --static

      # --live adds data_lake reads. ADVISORY on purpose (the tool exits 0 and prints):
      # on the current snapshot redfin_city_swfl / dbpr_re_licensees / leepa_parcel_zip
      # are all genuinely RED, and a blocking live gate on day one reds main — the exact
      # false-red disease this build exists to kill. Flip to `--live --gate` after one
      # green confirm (tracked by check `registry_identity_live_gating`).
      # NOTE: `gh secret set` is step 1; THIS env: block is step 2.
      - name: Registry identity (live, advisory)
        if: github.event_name == 'push'
        env:
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
          GH_TOKEN: ${{ github.token }}
        run: bun ingest/tools/check-registry-identity.mts --live
