name: Parcel subdivision annual (FDOR centroid, Collier + Lee)

on:
  schedule:
    # FDOR's NAL-derived centroid roll refreshes annually. The dlt merge is
    # idempotent, so a monthly run is a harmless no-op until the new roll lands —
    # same pattern as collier-parcels-annual.yml. Day 24 13:00 UTC: no existing
    # workflow occupies that day-of-month + hour slot (checked against the full
    # cron table in docs/standards/pipeline-freshness.md §3).
    - cron: "0 13 24 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch + normalize only; skip dlt write"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run parcel_subdivision pipeline (Collier + Lee)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          ARGS="--county both"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m ingest.pipelines.parcel_subdivision.pipeline $ARGS
