# .github/workflows/email-scheduler.yml
name: Email Scheduler
on:
  # THROTTLED 2026-07-18 (operator call, zero users yet): was */15 (96 runs/day),
  # cut to once daily. Bump back to a tighter tick once there's real send volume
  # to justify it. Overlap is still guarded two ways even at this cadence:
  # (1) concurrency.group below prevents a second run starting while one is in
  # flight, and (2) the worker claims rows with FOR UPDATE SKIP LOCKED so any
  # concurrent worker that does slip through sees an empty batch and exits 0.
  schedule:
    - cron: "45 15 * * *"
  # workflow_dispatch stays open in the meantime for manual DRY_RUN testing.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — log the would-send payload, do NOT send"
        required: false
        default: "false"
concurrency:
  group: email-scheduler
  cancel-in-progress: false
jobs:
  run-schedules:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run email scheduler
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          DIGEST_BROADCAST_SECRET: ${{ secrets.DIGEST_BROADCAST_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BRAINS_SUPABASE_URL: ${{ secrets.BRAINS_SUPABASE_URL }}
          BRAINS_SUPABASE_SERVICE_KEY: ${{ secrets.BRAINS_SUPABASE_SERVICE_KEY }}
          DIGEST_SENDER_NAME: ${{ vars.DIGEST_SENDER_NAME }}
          DIGEST_SENDER_ADDRESS: ${{ vars.DIGEST_SENDER_ADDRESS }}
        run: bun scripts/email/run-schedules.mts
