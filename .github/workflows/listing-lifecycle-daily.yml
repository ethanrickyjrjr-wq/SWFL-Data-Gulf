name: ingest-listing-lifecycle

# Listing-lifecycle state machine -> data_lake.listing_state + data_lake.listing_transitions.
#
# SPINE CUTOVER 2026-06-30: pipeline.py now defaults to --source api (SteadyAPI sole spine; RentCast
# retired). The api path reads the PHOTOS_API key (added to env below) and writes under
# source_name='api_feed'. The Source-B scrape prose below is RETAINED for history but the daily path is
# SteadyAPI. PHOTOS_API secret IS set (confirmed via `gh secret list` 2026-06-30/2026-07-01) — the
# code-level prerequisite for a live run is met. What still gates a live dispatch is operator
# authorization (paid SteadyAPI calls), not a missing secret.
# Plan: docs/superpowers/plans/2026-06-30-steadyapi-sole-spine/phase-1-inventory-cutover.md
#
# GRADUATED 2026-07-01: runner-IP WAF proven clean on both heavyweight counties (Collier 8,120 rows,
# Lee 21,889 rows, both dry_run=false, zero [skip]/[warn] 403 in either log — runs 28495956344 /
# 28496497637). SCOPE: Lee + Collier + Hendry — the 07/01 Lee+Collier-only decree was reversed by the
# operator 2026-07-02 (hendry_seed_orphans decision): SteadyAPI probe proved Hendry field parity
# (LaBelle 817 + Clewiston 349 listings, ~7 search calls/day). Cadence entry moved
# from `not_yet_running:` to `pipelines:` in ingest/cadence_registry.yaml in the same commit so this is
# now freshness-probed, not just scheduled. Crons are STAGGERED per county (3 h apart) — never run all
# counties in one pass (mirrors ingest-active-listings, which staggers for the same WAF reason).
# _PAGE_DELAY stays >= 1.5s (currently 1.8s in extract.py); do not lower it.
#
# Source URL is NOT in the repo: read from the LISTING_LIFECYCLE_BASE_URL secret.

on:
  # ── CRON RETIRED 07/12/2026: superseded by nightly-chain.yml ────────────────
  # Invoked by `needs:` from the chain (on: workflow_call), matrix
  # [Lee, Collier, Hendry] — same counties, one clock. A second clock here would
  # re-create the independent-drift bug the chain exists to kill (each member
  # paid +45m..+5h29m of its own drift; execution order was random — 08d §6).
  # The 3h stagger existed to dodge the source's sustained-burst 403 throttle
  # from ONE IP; the chain's matrix legs each run on their own runner/IP, so
  # requests never accumulate the way a single all-county pass would.
  # Commented, not deleted: reverting the cutover is one uncomment away.
  #
  # schedule:
  #   - cron: "0 9 * * *"    # Lee     (heaviest — ~7.4k listings)
  #   - cron: "0 12 * * *"   # Collier
  #   - cron: "0 15 * * *"   # Hendry  (lightest — ~1.2k listings, added 2026-07-02; staggered 3 h like the rest)
  workflow_dispatch:
    inputs:
      county:
        description: "Limit to one SWFL county, e.g. 'Lee' (blank = all SWFL_COUNTIES)"
        required: false
        default: ""
      dry_run:
        # Defaults TRUE: the SteadyAPI catch-up is not yet operator-authorized, so an accidental
        # dispatch must NOT write the DB or fire enrich network calls. Set false only for the real run.
        # A dry-run still fires the cheap (~106-call/county) search sweep — that IS the budget the
        # [budget] line reads — but makes ZERO /nearby-home-values calls. First low-call validation:
        # dry_run=true, county=Collier (~35 calls) — also proves the runner IP clears SteadyAPI's WAF.
        description: "Dry-run: search sweep + diff, print [budget], NO DB write, NO enrich calls"
        type: boolean
        default: true
  # Reusable entry point for the nightly ordered chain (nightly-chain.yml).
  # dry_run DEFAULTS TRUE here, exactly as it does for workflow_dispatch above and
  # for the same reason: SteadyAPI calls cost money, so a caller that FORGETS to
  # pass dry_run must not burn budget. nightly-chain.yml passes `dry_run: false`
  # explicitly. A forgotten flag then shows up as assert_landed STALE (loud red),
  # never as a silent paid run.
  workflow_call:
    inputs:
      county:
        description: "Limit to one SWFL county, e.g. 'Lee' (blank = all SWFL_COUNTIES)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry-run: search sweep + diff, print [budget], NO DB write, NO enrich calls"
        required: false
        type: boolean
        default: true

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60  # all-county band-partition walk is request-heavy; single-county ~10-20 min
    env:
      DATABASE_URL: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
      # SteadyAPI sole-spine key (the api path reads PHOTOS_API). Secret must be set first — see header.
      PHOTOS_API: ${{ secrets.PHOTOS_API }}
      # Retained Source-B scrape URL (legacy --source scrape path only; the default api path ignores it).
      LISTING_LIFECYCLE_BASE_URL: ${{ secrets.LISTING_LIFECYCLE_BASE_URL }}
      # Residential proxy for WAF bypass. No-op when unset (activates for WAF escalation fallback).
      CRAWL4AI_PROXY: ${{ secrets.CRAWL4AI_PROXY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r ingest/requirements.txt

      - name: Install Playwright browser
        # Missing on 07/07 (28884444909/28874493335/28863961787): crawl4ai's browser leg needs the
        # Chromium binary separately from the pip package. Its absence didn't crash the run — it
        # silently degraded to a near-empty sweep (28 SteadyAPI calls vs. a normal ~4-7k), producing
        # the 3-new/3-cuts/11-departure "partial scan" day surfaced on /desk. Fail loud instead.
        run: playwright install chromium --with-deps

      - name: crawl4ai preflight (advisory)
        continue-on-error: true
        run: crawl4ai-doctor

      - name: Resolve county
        id: resolve
        run: |
          case "${{ github.event.schedule }}" in
            "0 9 * * *")  echo "county=Lee"      >> "$GITHUB_OUTPUT" ;;
            "0 12 * * *") echo "county=Collier"  >> "$GITHUB_OUTPUT" ;;
            "0 15 * * *") echo "county=Hendry"   >> "$GITHUB_OUTPUT" ;;
            *)             echo "county=${{ inputs.county }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run listing-lifecycle pipeline
        env:
          COUNTY_INPUT: ${{ steps.resolve.outputs.county }}
          DRY_INPUT: ${{ inputs.dry_run }}
        run: |
          ARGS=()
          if [ -n "$COUNTY_INPUT" ]; then ARGS+=(--county "$COUNTY_INPUT"); fi
          if [ "$DRY_INPUT" = "true" ]; then ARGS+=(--dry-run); fi
          python -m ingest.pipelines.listing_lifecycle.pipeline "${ARGS[@]}"
