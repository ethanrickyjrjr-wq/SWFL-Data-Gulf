name: City pulse daily

on:
  # RE-ENABLED 07/07/2026 — crawl4ai-fetch + Sonnet-distill retrofit is live on
  # main (docs/superpowers/plans/2026-07-07-pulse-intelligence-engine/HANDOFF.md,
  # Task 6). Dry-run confirmed on the runner: zero web_search billing, 11 Sonnet
  # distill calls, $0.86 total (run 28883520933). Corridor pulse stays dark —
  # see corridor-pulse-weekly.yml.
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — lake match + distill, print rows, no upload/DB write"
        required: false
        default: "false"
      city:
        description: "Single city by exact name (blank = all 7)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    # Post-retrofit (lake-read + Sonnet distill, no web_search): dry-run over all
    # 13 cities completed in 2m49s (run 28883520933, 07/07/2026). 45 keeps the old
    # web_search-era headroom in case of lake/API slowness on a busy news day.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run city_pulse pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then EXTRA="--dry-run"; fi
          if [ -n "${{ github.event.inputs.city }}" ]; then
            python -m ingest.pipelines.city_pulse.pipeline --city "${{ github.event.inputs.city }}" $EXTRA
          else
            python -m ingest.pipelines.city_pulse.pipeline $EXTRA
          fi
