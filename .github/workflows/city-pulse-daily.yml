name: City pulse daily

on:
  # RE-ENABLED 07/05/2026 in WEEKLY cost mode (operator: build data cheaply pre-launch).
  # Wednesday 09:00 UTC — clear of the Monday 08:00/09:00/10:00 slots (swfl-inc,
  # dbpr-press, dbpr-notices). At launch: restore "0 9 * * *" (daily) + registry
  # cadence_days: 1 + freshness_sla 2/4 in the same commit.
  schedule:
    - cron: "0 9 * * 3"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — search + distill, print rows, no upload/DB write"
        required: false
        default: "false"
      city:
        description: "Single city by exact name (blank = all 7)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    # 13 cities × sequential Anthropic web_search calls run ~24 min (06-15: 24m15s,
    # 06-28: 24m11s) — a 25-min cap guillotines a normal run. 45 gives ~1.85× headroom
    # for a busy news day (more cited spans → longer distill, more searches).
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run city_pulse pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then EXTRA="--dry-run"; fi
          if [ -n "${{ github.event.inputs.city }}" ]; then
            python -m ingest.pipelines.city_pulse.pipeline --city "${{ github.event.inputs.city }}" $EXTRA
          else
            python -m ingest.pipelines.city_pulse.pipeline $EXTRA
          fi
