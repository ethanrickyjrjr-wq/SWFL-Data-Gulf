name: SWFL news daily (Tier 1 cold storage)

on:
  schedule:
    # 11:00 UTC = 7 AM ET daily.
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — scrape and build NDJSON but skip Storage + inventory writes"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run news_swfl pipeline
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          # Spider is the fallback vendor for plain scrape per pipeline-freshness §6.
          # If the secret is unset, scrape_with_fallback() runs firecrawl-only and logs a warning.
          SPIDER_API_KEY: ${{ secrets.SPIDER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.news_swfl.pipeline --dry-run
          else
            python -m ingest.pipelines.news_swfl.pipeline
          fi
