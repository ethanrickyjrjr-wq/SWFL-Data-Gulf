name: FEMA NFIP quarterly

on:
  schedule:
    # 13:00 UTC = 9 AM ET on the 5th of Jan / Apr / Jul / Oct.
    - cron: "0 13 5 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch and validate only; skip dlt write"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    # 45, not 30: run 28744412719 (07/05/2026) got killed at the 30m ceiling with ZERO
    # visible progress in the log — a red herring. resources.py's print() calls had no
    # flush=True, so on a non-TTY GHA runner stdout block-buffers and a hard kill loses
    # whatever was in the buffer; the retry math (5xx backoff up to 300s x up to 6
    # attempts, possibly across 2+ pages) can legitimately eat 25+ min even in a run
    # that would otherwise succeed. Fixed the logging blindness (flush=True everywhere
    # in ingest/pipelines/fema/) AND gave real retry headroom.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run fema pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.fema.pipeline --dry-run
          else
            python -m ingest.pipelines.fema.pipeline
          fi
