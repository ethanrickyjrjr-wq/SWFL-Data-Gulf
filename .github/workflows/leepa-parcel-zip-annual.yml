name: LeePA parcel->ZIP crosswalk annual

on:
  schedule:
    # 10:30 UTC on the 15th of every month (offset from leepa-parcels at 10:00).
    # The crosswalk is geometrically stable (parcels don't move); annual is the
    # real cadence. Monthly idempotent retries (dlt merge on folioid) keep a single
    # GHA failure from orphaning the pipeline for a year, and catch new/split parcels.
    - cron: "30 10 15 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch centroids + assign ZIPs, print match rate; skip dlt write"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run leepa_parcel_zip crosswalk pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.leepa_parcel_zip.pipeline --dry-run
          else
            python -m ingest.pipelines.leepa_parcel_zip.pipeline
          fi
