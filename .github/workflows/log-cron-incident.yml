    types: [completed]

permissions:
  contents: read # checkout only — incident state lives in issues/checks, never a main push
  issues: write # open/close/comment on incident issues
  actions: read # gh run view --log-failed
  repository-projects: write # gh project item-add

concurrency:
  # Serialize per-workflow so a fail+resolve pair (or two rapid failures) can't race the ledger.
  group: log-cron-incident-${{ github.event.workflow_run.name }}
  cancel-in-progress: false

jobs:
  record_failure:
    if: >
      vars.CRON_INCIDENT_LOGGER_ENABLED != 'false' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Record failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CRON_INCIDENT_ISSUE_NUMBER: ${{ vars.CRON_INCIDENT_ISSUE_NUMBER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node .github/scripts/log-cron-incident.mjs --mode=record-failure

  maybe_auto_resolve:
    if: >
      vars.CRON_INCIDENT_LOGGER_ENABLED != 'false' &&
      vars.CRON_INCIDENT_AUTO_RESOLVE_ENABLED != 'false' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Maybe auto-resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CRON_INCIDENT_ISSUE_NUMBER: ${{ vars.CRON_INCIDENT_ISSUE_NUMBER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node .github/scripts/log-cron-incident.mjs --mode=maybe-resolve
