name: Smoke — Prod

# Fires when Vercel's GitHub integration marks a deployment as success.
# No polling — Vercel tells us when it's READY.
on:
  deployment_status:

# One smoke run at a time — cancel if a newer deployment finishes first.
concurrency:
  group: smoke-prod-${{ github.event.deployment.environment }}-${{ github.event.deployment.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    # Run for any successful Vercel deployment. Production keeps its original
    # behavior (assert prod + stamp checks). Preview deploys assert against the
    # preview URL with --no-stamp, so a bug reddens the PR before it reaches prod.
    if: github.event.deployment_status.state == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run smoke tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ENVIRONMENT: ${{ github.event.deployment.environment }}
          # Vercel populates environment_url with the deployment's URL; target_url
          # is the fallback the GitHub deployment_status API also carries.
          PREVIEW_URL: ${{ github.event.deployment_status.environment_url }}
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          if [ "$ENVIRONMENT" = "Production" ]; then
            bun scripts/smoke-prod.mts --base https://www.swfldatagulf.com
          else
            URL="$PREVIEW_URL"
            [ -z "$URL" ] && URL="$TARGET_URL"
            if [ -z "$URL" ]; then
              echo "No preview URL on the deployment_status event — skipping."
              exit 0
            fi
            echo "Preview smoke against: $URL"
            bun scripts/smoke-prod.mts --base "$URL" --no-stamp
          fi
