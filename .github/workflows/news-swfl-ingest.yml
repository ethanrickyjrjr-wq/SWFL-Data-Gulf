name: SWFL business news ingest daily

on:
  schedule:
    - cron: "0 6 * * *"    # 6am UTC daily — Vercel cron scores articles at 7am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        default: "false"
      news_adaptive:
        description: "Crawl strategy: '1' = adaptive BestFirst frontier, 'off' = baseline ~40-cap"
        required: false
        default: "1"

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r ingest/requirements.txt

      - name: Install crawl4ai browsers
        run: crawl4ai-setup

      - name: crawl4ai preflight (advisory)
        continue-on-error: true
        run: crawl4ai-doctor

      - name: Run news ingest
        env:
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
          # Adaptive BestFirst frontier by default (SOLO-14). Scheduled runs send no input
          # (-> '1' = adaptive); dispatch with news_adaptive='off' for a baseline comparison.
          NEWS_ADAPTIVE: ${{ github.event.inputs.news_adaptive == 'off' && '' || '1' }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.news_swfl.pipeline --dry-run
          else
            python -m ingest.pipelines.news_swfl.pipeline
          fi
