name: Heal cron failure

# Reacts to a failed production cron `workflow_run` with leveled self-healing.
# Pairs with "Log cron incident" (which owns the incident issue + deterministic
# diagnosis). This workflow adds L0 retry (transient) and L2 LLM narrative (fuzzy).
#
# The LLM never writes code. L0 retries at most once (run_attempt guard). Daily
# Brain Rebuild is intentionally excluded (it owns refinery/lib/master-freeze-watchdog.mts).
#
# Kill switches (repo Settings -> Variables):
#   CRON_HEAL_ENABLED          = "false"  -> disable everything
#   CRON_HEAL_RETRY_ENABLED    = "false"  -> keep triage/diagnose, drop L0 retry
#   CRON_HEAL_DIAGNOSE_ENABLED = "false"  -> keep triage/retry, drop L2 diagnosis
#   CRON_HEAL_BRANCHFIX_ENABLED           -> reserved for the deferred L1 (auto-branch dep-fix)
#
# Spec: docs/superpowers/specs/2026-06-08-leveled-cron-self-healing-design.md

on:
  workflow_run:
    workflows:
      - "Airtable checks sync"
      - "BLS LAUS monthly"
      - "BLS OEWS SWFL annual"
      - "BLS QCEW quarterly"
      - "Census ACS annual"
      - "Census CBP annual"
      - "Collier parcels annual (FDOR cadastral)"
      - "DBPR Press Releases weekly"
      - "DBPR Public Notices — Weekly SWFL"
      - "DBPR RE Licensees (New-Agent Radar) — Weekly"
      - "DBPR SIRS Submissions — Monthly SWFL"
      - "Daily Email Digest"
      - "Data Targets (daily)"
      - "Data-readiness verification (daily)"
      - "Deliverables retention sweep (daily)"
      - "Email Scheduler"
      - "FAF5 freight annual (S3 parquet cold lane)"
      - "FDLE crime quarterly"
      - "FDOT AADT annual"
      - "FEMA NFIP quarterly"
      - "FGCU RERI monthly"
      - "FHFA HPI quarterly"
      - "FL DBPR contractor licenses monthly"
      - "FL DOR TDT monthly"
      - "FL DOR sales tax monthly"
      - "FRED ALFRED LAUS monthly"
      - "Graphify Republish"
      - "HURDAT2 FL annual"
      - "Home-Values + Investor Composite monthly"
      - "Lee County permits weekly"
      - "LeePA parcels annual"
      - "Lifecycle-arc nudges (daily)"
      - "NOAA GHCN rainfall monthly"
      - "Neighborhood stats annual (aggregate parcel_subdivision_v)"
      - "Pipeline freshness probe (daily)"
      - "Project-feed change detection (daily)"
      - "RSW Airport monthly"
      - "Redfin Collier market monthly"
      - "Redfin Contract Cancellations Tier 1 monthly"
      - "Redfin Delistings & Relistings Tier 1 monthly"
      - "Redfin Lee market monthly"
      - "Redfin Price Drops Tier 1 monthly"
      - "Redfin SWFL Tier 1 monthly"
      - "Redfin SWFL city market monthly"
      - "Reverify closed-check signals (daily)"
      - "SWFL Inc. economic dev weekly"
      - "SWFL business news ingest daily"
      - "SWFL search demand monthly"
      - "SWFL storm history Tier 1 monthly"
      - "Tier Divergence SWFL Tier 1 fetch monthly"
      - "Tier Divergence SWFL Tier 2 load monthly"
      - "USGS SWFL Tier 1 monthly"
      - "ZHVI SWFL Tier 1 fetch monthly"
      - "ZHVI SWFL Tier 2 load monthly"
      - "ZORI SWFL Tier 1 fetch monthly"
      - "ZORI SWFL Tier 2 load monthly"
      - "bls-ppi monthly"
      - "census-vip monthly"
      - "fred-g17 monthly"
      - "fred-listing-swfl monthly"
      - "ingest-brevitas-listings"
      - "ingest-crexi-listings"
      - "ingest-lee-associates-swfl"
      - "ingest-local-cre-context"
      - "ingest-market-aggregates-details"
      - "ingest-market-aggregates-histogram"
      - "ingest-mhs-permits-swfl"
      - "ingest-rentals"
      - "market-heat-swfl monthly"
      - "marketbeat-pdf-ingest"
      - "notion-sync-weekly"
      - "social-pulse-scan"
      - "view_vintages monthly capture"
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Failed run ID to heal (from the run URL)"
        required: true

permissions:
  contents: read # checkout the classifier + pipeline source
  issues: write # comment the L2 diagnosis on the incident issue
  actions: write # gh run rerun --failed (L0)

concurrency:
  group: heal-${{ github.event.workflow_run.id || github.event.inputs.run_id }}
  cancel-in-progress: false

jobs:
  triage:
    # Same widening as the logger: a cancelled SCHEDULED run may be a timeout kill.
    # heal-cron-failure.mjs::classifyTermination forces should_retry=false AND
    # needs_llm=false for every termination class, so a cancelled run is never re-run
    # (the money guard) and never reaches the LLM.
    if: >
      vars.CRON_HEAL_ENABLED != 'false' &&
      (github.event.workflow_run.conclusion == 'failure' ||
      ((github.event.workflow_run.conclusion == 'cancelled' ||
      github.event.workflow_run.conclusion == 'timed_out') &&
      github.event.workflow_run.event == 'schedule') ||
      github.event_name == 'workflow_dispatch') &&
      github.event.workflow_run.name != 'Daily Brain Rebuild' &&
      github.event.workflow_run.name != 'Nightly Chain'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      class: ${{ steps.t.outputs.class }}
      signal: ${{ steps.t.outputs.signal }}
      should_retry: ${{ steps.t.outputs.should_retry }}
      needs_llm: ${{ steps.t.outputs.needs_llm }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - id: t
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.inputs.run_id }}
        run: node .github/scripts/heal-cron-failure.mjs --mode=triage

  retry:
    needs: triage
    if: >
      vars.CRON_HEAL_RETRY_ENABLED != 'false' &&
      needs.triage.outputs.should_retry == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: L0 — re-run failed jobs once
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.inputs.run_id }}
        run: node .github/scripts/heal-cron-failure.mjs --mode=retry

  diagnose:
    needs: triage
    if: >
      vars.CRON_HEAL_DIAGNOSE_ENABLED != 'false' &&
      needs.triage.outputs.needs_llm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies (for @anthropic-ai/sdk)
        run: bun install --frozen-lockfile
      - name: L2 — diagnose + comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_ID: ${{ github.event.inputs.run_id }}
        run: node .github/scripts/heal-cron-failure.mjs --mode=diagnose
