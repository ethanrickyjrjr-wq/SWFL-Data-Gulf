# .github/workflows/daily-email-digest.yml
name: Daily Email Digest

on:
  schedule:
    # 14:23 UTC = 10:23 AM EDT / 9:23 AM EST weekdays — the researched engagement
    # peak (Brevo send-time study: ~10 AM local best; spec 2026-07-10-batch-
    # narrative-bake-design.md §4 + companion send-window spec). :23 is our
    # anti-congestion minute (GitHub schedule delays peak at :00), NOT a research
    # finding — customer-facing copy never quotes it.
    # Clear of: daily-rebuild (23 4), city-pulse (0 9), freshness-probe (0 14).
    - cron: "23 14 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — render + write preview log, do NOT send"
        required: false
        default: "false"

concurrency:
  group: daily-email-digest
  cancel-in-progress: false

jobs:
  send-digest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # needed to commit the email log

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Push the email log to main as the repo owner — the ONLY bypass actor on the
          # 'main protection' ruleset. The default GITHUB_TOKEN (github-actions[bot]) is
          # structurally blocked (GH013), which is why `git push || true` was silently
          # dropping every log after the ruleset took effect (~2026-06-23): green runs,
          # no persisted log → broken issue-numbering + idempotency. Same fix as daily-rebuild.
          # persist-credentials keeps this token wired for the later `git push` below.
          token: ${{ secrets.REBUILD_PAT }}
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Send daily digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          # Set these as Actions Variables (not secrets — not sensitive)
          DIGEST_SENDER_NAME: ${{ vars.DIGEST_SENDER_NAME }}
          DIGEST_SENDER_ADDRESS: ${{ vars.DIGEST_SENDER_ADDRESS }}
          DIGEST_SENDER_CONTACT: ${{ vars.DIGEST_SENDER_CONTACT }}
          # CAN-SPAM physical mailing address (iPostal1 business mailbox) — the footer
          # postal address, split from DIGEST_SENDER_ADDRESS (the sender email).
          DIGEST_POSTAL_ADDRESS: ${{ vars.DIGEST_POSTAL_ADDRESS }}
        run: bun scripts/email/build-digest.mts

      - name: Commit email log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/email-marketing/email-logs/ || true
          if git diff --staged --quiet; then
            echo "No email log change to commit."
          else
            git commit -m "log(email): digest $(date -u +%Y-%m-%d)"
            # Loud push (no `|| true`): the log is load-bearing for issue-numbering +
            # the idempotency guard, so a failed push must redden the run, not hide.
            # fetch→rebase→retry handles another cron landing on main mid-run.
            for attempt in 1 2 3; do
              git fetch origin
              git rebase --autostash origin/main
              if git push; then
                echo "Push succeeded on attempt $attempt."
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "::error::Email-log push failed after 3 attempts." >&2
                exit 1
              fi
              echo "Push rejected — another commit landed first; retrying (attempt $attempt/3)..."
            done
          fi

      - name: Healthchecks.io heartbeat
        if: always()
        run: |
          curl -fsS -m 10 --retry 3 \
            "https://hc-ping.com/${{ secrets.HEALTHCHECKS_PING_KEY }}/daily-email-digest?create=1" || true
