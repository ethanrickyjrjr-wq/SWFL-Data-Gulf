name: FDOT AADT annual

on:
  schedule:
    # 10:00 UTC on the 15th of every month.
    # Data is annual-release but monthly retries prevent a single GHA failure
    # from orphaning the pipeline for a year. Runs are idempotent (dlt upsert).
    - cron: "0 10 15 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch and validate only; skip dlt write"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    # 2026-06-15's only real (non-dry-run) scheduled run used ~19.5 of the old 20min cap
    # and got hard-killed mid-Tier-2-replace — since `write_disposition="replace"` truncates
    # before reinserting, the kill left data_lake.fdot_aadt_fl empty for 18 days undetected.
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run fdot pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.fdot.pipeline --dry-run
          else
            python -m ingest.pipelines.fdot.pipeline
          fi
