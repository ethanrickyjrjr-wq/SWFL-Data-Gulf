# Factuality CI gate — BLOCKING as of 2026-07-21 (spec 2026-07-16-factuality-ci-gate-design.md
# D5/D6; ratchet 3/4, check `factuality_gate_blocking_flip`). Flipped continue-on-error true->false
# after a validated warn-first stretch: 17/17 step-level green over the gate's entire life
# (runs 29481865012 [2026-07-16] .. 29781925042 [2026-07-20], all step conclusion=success — the
# job-level continue-on-error does not mask a step conclusion, so these are real passes).
# CAVEAT — this gate is LLM-JUDGED (promptfoo `factuality` grader, 14 fixtures, live Anthropic
# calls): grading nondeterminism OR an Anthropic/infra blip (surfaced as result.error) can red
# main with no code change. If it flakes, revert continue-on-error to true. Supabase secrets are
# LOAD-BEARING: without them
# logApiUsage() silently no-ops and the grading spend becomes invisible.
# Spec deviation, documented: spec success-criteria said "a real PR"; this repo
# pushes to main and never opens PRs, so the trigger is push-with-path-filter
# plus manual dispatch.
name: factuality-gate
on:
  push:
    branches: [main]
    paths:
      - "lib/deliverable/**"
      - "refinery/agents/anthropic.mts"
      - ".github/workflows/factuality-gate.yml"
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    continue-on-error: false # BLOCKING 2026-07-21 (ratchet 3/4). See header for the validated warn-first evidence + the LLM-judged false-red caveat.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run factuality gate (14 graded fixtures via spend seam)
        env:
          FACTUALITY_GATE: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: bun test lib/deliverable/factuality-gate.test.ts
