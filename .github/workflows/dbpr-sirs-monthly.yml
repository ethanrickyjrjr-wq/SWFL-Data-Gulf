name: DBPR SIRS Submissions — Monthly SWFL

on:
  schedule:
    # Monthly on the 1st, 07:00 UTC.
    - cron: "0 7 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        default: "false"

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    # Self-hosted runner on the operator's machine: its residential IP reaches the DBPR WAF
    # directly (GitHub datacenter IPs are silently dropped — page.goto times out). The
    # 'swfl-local' label scopes this job to that one runner. Keeps SIRS on GHA + the ops
    # dashboard (logs, retries, visibility) instead of an invisible local Task Scheduler job.
    runs-on: [self-hosted, swfl-local]
    timeout-minutes: 30
    defaults:
      run:
        # Git Bash on the Windows runner, so the existing bash steps work unchanged.
        shell: bash

    steps:
      - uses: actions/checkout@v6

      # NO actions/setup-python here: on a self-hosted runner it edits HKLM during install
      # and fails with "registry access is not allowed" under the non-elevated runner account.
      # Use the machine's own Python — the env that already runs this pipeline — via `python`.
      - name: Install Python deps
        run: python -m pip install -r ingest/requirements.txt

      - name: Ensure Playwright Chromium
        # qix.py drives raw Playwright; chromium is the only browser it needs. Idempotent —
        # reuses the runner user's ms-playwright cache when already present.
        run: python -m playwright install chromium

      - name: Run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
          # Runs on the self-hosted 'swfl-local' runner (residential IP), so it reaches the
          # DBPR WAF directly and CRAWL4AI_PROXY stays unset -> qix.py goes direct. Kept wired
          # as a fallback: if this ever moves back to a cloud runner, set the secret to escape
          # the datacenter-IP block without touching code.
          CRAWL4AI_PROXY: ${{ secrets.CRAWL4AI_PROXY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python -m ingest.pipelines.dbpr_sirs.pipeline $DRY_RUN_FLAG
