name: Property Watch scan (daily)

# PARKED until property_watch_live_verify passes: dispatch-only, no active schedule. The scan writes
# only to public.project_events (an app table — no LLM, no paid API), so it is safe to schedule; the
# operator adds the `schedule:` block below after the live-verify. To activate, uncomment:
#   schedule:
#     - cron: "30 16 * * *"   # after listing-lifecycle-daily + lifecycle-nudges (16:00) have committed
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print every would-insert event, write nothing"
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Property Watch scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "false" ]; then
            bun scripts/project-feed/watch-scan.mts
          else
            bun scripts/project-feed/watch-scan.mts --dry-run
          fi

      - name: Healthchecks.io heartbeat
        if: always()
        run: |
          curl -fsS -m 10 --retry 3 \
            "https://hc-ping.com/${{ secrets.HEALTHCHECKS_PING_KEY }}/watch-scan-daily?create=1" || true
