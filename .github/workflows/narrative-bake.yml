# Surface-narrative bake (spec docs/superpowers/specs/2026-07-09-zip-page-destination-design.md).
# Cron fires daily; the script's BAKE_CADENCE gate decides whether today bakes:
#   repo variable BAKE_CADENCE unset/"weekly" (default) -> Mondays (UTC) only
#   repo variable BAKE_CADENCE="daily"                  -> every firing
# LAUNCH FLIP = edit that one repo variable. No workflow edits, no deploy.
name: narrative-bake

on:
  # PRIMARY TRIGGER — chained, not clocked: fires when the Daily Brain Rebuild
  # completes, whenever GitHub's drifting scheduler actually ran it (observed
  # 2.3-4.1h late on the old 06:00 slot). The batch submits immediately;
  # results typically land within the hour. Spec:
  # 2026-07-10-batch-narrative-bake-design.md §4.
  workflow_run:
    workflows: ["Daily Brain Rebuild"]
    types: [completed]
  # BACKSTOP — GitHub docs: heavily-loaded schedules can be DROPPED entirely.
  # If the rebuild never fired, this still bakes once a day; the delta gate
  # makes a redundant firing cost ~$0 (unchanged keys skip before any API call).
  schedule:
    - cron: "23 10 * * *"
  workflow_dispatch:
    inputs:
      surface:
        description: "Surface to bake (zip | corridor | brain | all)"
        default: "all"
      force:
        description: "Bypass cadence + delta gates (full rebake)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  bake:
    # workflow_run fires on failure/cancel too — only bake on a green rebuild.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # 90: the job now polls the Message Batch to completion (~1h typical worst
    # case) instead of making per-key synchronous calls. In-script deadline is
    # 80 min (BAKE_POLL_DEADLINE_MS) — on overrun it exits 0 loud and the next
    # run's Phase 0 collects the persisted batch.
    timeout-minutes: 90
    env:
      # SPEND GUARD — explicit, reviewable per-run cap (ingest/CLAUDE.md rule:
      # caps live as visible workflow lines, never code defaults). The metered
      # client's daily/monthly SpendCapError seam applies on top.
      NARRATIVE_BAKE_RUN_CAP_USD: "1.00"
      BAKE_CADENCE: ${{ vars.BAKE_CADENCE }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Bake narratives
        run: >
          bun scripts/bake-narratives.mts
          --surface "${{ inputs.surface || 'all' }}"
          ${{ inputs.force == true && '--force' || '' }}
