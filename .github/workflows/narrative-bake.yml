# Surface-narrative bake (spec docs/superpowers/specs/2026-07-09-zip-page-destination-design.md).
# Cron fires daily; the script's BAKE_CADENCE gate decides whether today bakes:
#   repo variable BAKE_CADENCE unset/"weekly" (default) -> Mondays (UTC) only
#   repo variable BAKE_CADENCE="daily"                  -> every firing
# LAUNCH FLIP = edit that one repo variable. No workflow edits, no deploy.
name: narrative-bake

on:
  # PRIMARY TRIGGER — chained, not clocked: fires when the Daily Brain Rebuild
  # completes, whenever GitHub's drifting scheduler actually ran it (observed
  # 2.3-4.1h late on the old 06:00 slot). The batch submits immediately;
  # results typically land within the hour. Spec:
  # 2026-07-10-batch-narrative-bake-design.md §4.
  workflow_run:
    workflows: ["Daily Brain Rebuild"]
    types: [completed]
  # ── CRON RETIRED 07/12/2026 ──────────────────────────────────────────────────
  # This was `23 10` = 06:23 AM EDT — PAST the operator's 6:00 AM Eastern ceiling,
  # in production, every day. It existed as a backstop against GitHub DROPPING the
  # rebuild's schedule; the chain now invokes this workflow by `needs: rebuild`
  # from a single clocked head, so the backstop's job is done by the head's own
  # backstop. The workflow_run trigger above stays but is inert under the chain
  # (a reusable workflow emits no workflow_run event of its own) — it still fires
  # after a MANUAL daily-rebuild dispatch, where the delta gate makes a redundant
  # bake cost ~$0. Commented, not deleted: revert is one uncomment away.
  #
  # schedule:
  #   - cron: "23 10 * * *"
  workflow_dispatch:
    inputs:
      surface:
        description: "Surface to bake (zip | corridor | brain | all)"
        default: "all"
      force:
        description: "Bypass cadence + delta gates (full rebake)"
        type: boolean
        default: false
  # Reusable entry point for the nightly ordered chain (nightly-chain.yml) — the
  # chain calls this by `needs: rebuild`, which SUPERSEDES the workflow_run trigger
  # above: a reusable workflow emits no workflow_run event of its own (the run
  # belongs to the caller), so once the chain is the only invoker of Daily Brain
  # Rebuild, that trigger stops firing. Intended. The `if:` guard below still
  # evaluates true here (github.event_name is the CALLER's event, not workflow_run).
  workflow_call:
    inputs:
      surface:
        description: "Surface to bake (zip | corridor | brain | all)"
        required: false
        type: string
        default: "all"
      force:
        description: "Bypass cadence + delta gates (full rebake)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  bake:
    # workflow_run fires on failure/cancel too — only bake on a green rebuild.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # 90: the job now polls the Message Batch to completion (~1h typical worst
    # case) instead of making per-key synchronous calls. In-script deadline is
    # BAKE_POLL_DEADLINE_MS (env below pins it to 45 min for the chain; in-script
    # default is 80) — on overrun it exits 0 loud and the next run's Phase 0
    # collects the persisted batch.
    timeout-minutes: 90
    env:
      # SPEND GUARD — explicit, reviewable per-run cap (ingest/CLAUDE.md rule:
      # caps live as visible workflow lines, never code defaults). The metered
      # client's daily/monthly SpendCapError seam applies on top.
      NARRATIVE_BAKE_RUN_CAP_USD: "1.00"
      # TIME GUARD for the chain. The bake is the chain's single largest term and
      # has NEVER been measured — all 4 runs in its history were cadence skips.
      # In-script default is 80 min (BAKE_POLL_DEADLINE_MS, bake-narratives.mts:96)
      # under a 90-min job ceiling; 45 min keeps the chain's tail bounded. On
      # overrun the script exits 0 LOUD and the next run collects the persisted
      # batch (see the timeout-minutes comment below) — a bounded bake is safe by
      # design, not a data loss. 08d §5b.
      BAKE_POLL_DEADLINE_MS: "2700000"   # 45 min
      BAKE_CADENCE: ${{ vars.BAKE_CADENCE }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Bake narratives
        run: >
          bun scripts/bake-narratives.mts
          --surface "${{ inputs.surface || 'all' }}"
          ${{ inputs.force == true && '--force' || '' }}
