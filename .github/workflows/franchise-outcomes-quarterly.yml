name: SBA FOIA Franchise Outcomes Tier 1 quarterly

on:
  # SCHEDULE DISABLED 07/14/2026 — the pipeline is `parked: true` under
  # `not_yet_running:` in ingest/cadence_registry.yaml, but this cron was left
  # live and would have fired 07/15/2026 08:00 UTC against a parked source.
  # Parked means parked: a source with no first live run has never had its
  # write path proven, and a quarterly cron is the worst place to discover that.
  # Re-enable in the SAME commit that promotes the entry to `pipelines:`.
  # Tracked as check `sba_franchise_parked_but_live`.
  #
  # SBA FOIA updates quarterly, ~1 month after each quarter end.
  # 15th of Jan / Apr / Jul / Oct at 08:00 UTC.
  # schedule:
  #   - cron: "0 8 15 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print what would be downloaded/written; skip upload"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run SBA FOIA franchise outcomes pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
          SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          SUPABASE_S3_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          SUPABASE_S3_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.duckdb_pipelines.franchise_outcomes.pipeline --dry-run
          else
            python -m ingest.duckdb_pipelines.franchise_outcomes.pipeline
          fi
