name: ingest-rentals

# SteadyAPI /rentals-search active rental inventory -> data_lake.rental_listings_swfl (active-rentals-swfl).
# ~471 calls/run (Lee + Collier, county-form only, paginated to completion). Provenance surfaced =
# realtor.com; access layer never named.
#
# GRADUATED 2026-07-02: 1 clean live dispatch so far (run 28559510045, dry_run=false, success, 466 calls,
# 7,185 rows) — thin proof like market_aggregates above, so watch the first 1-2 scheduled fires before
# trusting it fully unattended. Cadence entry moved from `not_yet_running:` to `pipelines:` in
# ingest/cadence_registry.yaml in the same commit. Respects the engine on/off switch (vars.ENGINE_ENABLED)
# like every other cron.

on:
  schedule:
    - cron: "0 12 * * 1"   # Mondays 12:00 UTC — weekly (matches the sole-spine plan's rentals cadence)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (zero network, zero DB write)"
        type: boolean
        default: true

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
      PHOTOS_API: ${{ secrets.PHOTOS_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run rentals sweep
        env:
          DRY_INPUT: ${{ inputs.dry_run }}
        run: |
          ARGS=()
          if [ "$DRY_INPUT" = "true" ]; then ARGS+=(--dry-run); fi
          python -m ingest.pipelines.rentals.pipeline "${ARGS[@]}"
