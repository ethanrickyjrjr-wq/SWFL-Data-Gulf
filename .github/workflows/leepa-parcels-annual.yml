name: LeePA parcels annual

on:
  schedule:
    # 13:00 UTC = 9 AM ET on March 1st.
    # LeePA publishes the prior year's certified roll in early Q1; March 1 is
    # conservative enough to ensure the data is available.
    #
    # Reverted from the 05/30 monthly-retry experiment (0 10 15 * *) on 07/15:
    # the monthly cadence never once completed on GHA (5/5 scheduled+dispatch
    # runs cancelled at their timeout ceiling — 30min then 90min, same result
    # either way). The retry safety net was pure cost with no payoff since the
    # fetch itself never lands here; see check leepa_http_fetch_blocked_needs_crawl4ai_path.
    - cron: "0 13 1 3 *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — fetch and validate only; skip dlt write"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ingest:
    if: ${{ vars.ENGINE_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run leepa pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m ingest.pipelines.leepa.pipeline --dry-run
          else
            python -m ingest.pipelines.leepa.pipeline
          fi
