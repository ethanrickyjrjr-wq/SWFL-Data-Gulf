name: Daily Brain Rebuild

on:
  schedule:
    # 6 AM UTC daily (2 AM ET / 1 AM CT)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      pack_id:
        description: "Pack to rebuild (default: master runs full cascade)"
        required: false
        default: "master"
      force:
        description: "Force rebuild even if fresh (true/false)"
        required: false
        default: "false"

# Serialize rebuilds so overlapping runs (a manual dispatch landing while a
# scheduled run is mid-build, or several dispatches stacked up) can't race each
# other's push. The in-flight run finishes; the next queues behind it.
concurrency:
  group: daily-brain-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Python (for rebuild gate)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -r ingest/requirements.txt

      - name: Decide whether a rebuild is due
        id: gate
        env:
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS }}
        run: |
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "Force flag set — skipping gate, rebuild unconditionally."
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif python ingest/scripts/rebuild_due.py; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run refinery
        if: steps.gate.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          SUPABASE_S3_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          SUPABASE_S3_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
        run: |
          PACK="${{ github.event.inputs.pack_id || 'master' }}"
          FORCE_FLAG="${{ github.event.inputs.force == 'true' && '--force' || '' }}"
          echo "Rebuilding pack: $PACK $FORCE_FLAG"
          bun refinery/cli.mts $PACK $FORCE_FLAG

      - name: Commit updated brains
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brains/
          if git diff --staged --quiet; then
            echo "No brain files changed — all fresh, nothing to commit."
          else
            git commit -m "chore(brains): daily rebuild $(date -u '+%Y-%m-%d')"
            for attempt in 1 2 3; do
              git fetch origin
              git rebase origin/main
              if git push; then
                echo "Push succeeded on attempt $attempt."
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Push failed after 3 attempts — giving up."
                exit 1
              fi
              echo "Push rejected — another commit landed first; retrying (attempt $attempt/3)..."
            done
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const { GITHUB_RUN_ID, GITHUB_REPOSITORY } = process.env;
            const runUrl = `https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}`;
            core.warning(`Daily rebuild failed. Check: ${runUrl}`);
